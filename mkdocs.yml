site_name: SciLifeLab Architecture
site_url: https://scilifelab.github.io/architecture/
site_description: Architecture decisions and guidelines for SciLifeLab infrastructure
site_author: SciLifeLab Architecture Board

repo_name: scilifelab/architecture
repo_url: https://github.com/scilifelab/architecture

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.png
  font:
    text: Open Sans
    code: Fira Code
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: lime
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - attr_list
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Architecture Decisions:
      - decisions/0001-record-architecture-decisions.md
      - decisions/0002-use-cc-by-sa-4-0-license.md
      - decisions/0003-use-single-process-approach-for-architecture-requests.md
      - decisions/0004-use-mkdocs-material-for-documentation-site.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/scilifelab
    - icon: fontawesome/solid/globe
      link: https://scilifelab.se
  generator: false
  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
    actions:
      - accept
      - reject
      - manage
    cookies:
      github:
        name: GitHub
        checked: true

copyright: >-
  Licensed under
  <a href="https://creativecommons.org/licenses/by-sa/4.0/" target="_blank" rel="noopener">CC BY-SA 4.0</a>
  by SciLifeLab
